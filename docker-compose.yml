services:
  postgres:
    image: postgres:18-alpine
    container_name: marty-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: marty
      POSTGRES_PASSWORD: marty
      POSTGRES_DB: marty
    ports:
      - '5433:5432'
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U marty -d marty']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    container_name: marty-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  redis-data: